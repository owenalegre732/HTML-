<body>
  <p><strong>Abuhado:</strong>Apariencia que recuerda a la de un <em>buho</em> (con los ojos <em>hinchados</em>).</p> 

  <p><strong>Arrebol:</strong>Color <em>rojo</em> que toma el cielo al <em>amanecer</em> o al <em>atardecer</em>.</p>

  <p><strong>Ataraxia:</strong>Estado de <em>imperturbabilidad</em> y <em>serenidad</em>.</p>
